<script>
// ── STATE ──
const scriptUrl = WEDDING_CONFIG.SCRIPT_URL || '';
let pool = []; // checked-in guests not yet won
let wonGuests = []; // past winners
let isSpinning = false;
let animFrame;
let drumItems = [];

// ── STAR FIELD ──
(function() {
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function init() {
    resize();
    stars = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2
    }));
  }
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a = 0.2 + 0.6 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,130,154,${s.a * 0.6})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', init);
  init();
  requestAnimationFrame(draw);
})();

// ── LOAD GUESTS ──
async function loadCheckedInGuests() {
  const isConfigured = scriptUrl && scriptUrl !== 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';

  if (isConfigured) {
    // Always fetch live from Google Sheets — source of truth
    showToast('Loading checked-in guests…');
    try {
      const res = await fetch(`${scriptUrl}?action=getGuests`);
      const data = await res.json();
      const allGuests = data.guests || [];
      const checkedIn = allGuests.filter(g => g.checkedIn);
      pool = checkedIn.filter(g => !wonGuests.find(w => w.id === g.id));
      renderPool();
      buildDrum();
      showToast(`✓ ${pool.length} checked-in guest${pool.length !== 1 ? 's' : ''} loaded`);
      return;
    } catch(e) {
      showToast('Sheet unreachable — falling back to local data');
    }
  }

  // Fallback: try localStorage (set by admin check-in page on same browser)
  const saved = localStorage.getItem('wedding-guests');
  if (saved) {
    const allGuests = JSON.parse(saved);
    const checkedIn = allGuests.filter(g => g.checkedIn);
    pool = checkedIn.filter(g => !wonGuests.find(w => w.id === g.id));
    renderPool();
    buildDrum();
    showToast(`${pool.length} guest${pool.length !== 1 ? 's' : ''} loaded from local cache`);
    return;
  }

  // Nothing available — show empty state with helpful message
  pool = [];
  renderPool();
  buildDrum();
  showToast('No guest data found — set your Script URL in WEDDING_CONFIG');
}

// ── RENDER POOL ──
function renderPool() {
  const el = document.getElementById('guests-pool');
  document.getElementById('pool-count').textContent = `${pool.length} guests`;

  if (!pool.length && !wonGuests.length) {
    el.innerHTML = `<div class="empty-pool">No checked-in guests yet.<br>Go to Check-In to mark arrivals.</div>`;
    return;
  }

  const allItems = [
    ...pool.map(g => ({ ...g, won: false })),
    ...wonGuests.map(g => ({ ...g, won: true }))
  ];

  el.innerHTML = allItems.map(g => `
    <div class="pool-item ${g.won ? 'won' : ''}">
      <div class="pool-avatar">${getInitials(g.name)}</div>
      <div class="pool-name">${g.name}</div>
      <div class="pool-table">T${g.table || '?'}</div>
    </div>
  `).join('');
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

// ── BUILD DRUM ──
function buildDrum() {
  drumItems = pool.map(g => g.name);
  if (!drumItems.length) drumItems = ['—'];
  renderDrum(0);
}

// offset is a float; item at Math.round(offset) % total is always centred.
// We render 5 slots so there is always context above/below during fast spin.
function renderDrum(offset) {
  const track = document.getElementById('drum-track');
  const total = drumItems.length;
  const centerIdx = Math.round(offset);           // integer index of centred item
  const frac      = offset - Math.round(offset);  // -0.5 ... +0.5

  const slots = [-2, -1, 0, 1, 2];
  const items = slots.map(delta => {
    const idx = ((centerIdx + delta) % total + total) % total;
    return drumItems[idx];
  });

  // Centre slot is position 2 (0-indexed), shifted by frac for smooth scroll
  track.style.transform = `translateY(${38 - 44 * (2 + frac)}px)`;
  track.innerHTML = items.map((name, i) => `
    <div class="drum-item ${i === 2 ? 'center' : ''}">${name}</div>
  `).join('');
}

// ── SPIN ANIMATION ──
function spinDraw() {
  if (isSpinning || pool.length === 0) {
    if (pool.length === 0) showToast('No eligible guests remaining');
    return;
  }
  isSpinning = true;
  document.getElementById('btn-spin').disabled = true;
  document.getElementById('winner-display').innerHTML = '';

  // winnerIndex is the single source of truth for both drum and announcement
  const winnerIndex = Math.floor(Math.random() * pool.length);
  const fullLoops   = 3;
  const totalSpins  = fullLoops * pool.length + winnerIndex;
  const duration    = 3200;
  const start       = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed  = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const current  = easeOut(progress) * totalSpins;

    renderDrum(current);

    if (progress < 1) {
      animFrame = requestAnimationFrame(animate);
    } else {
      // Snap drum exactly to winner — then announce the exact same index
      renderDrum(winnerIndex);
      finishDraw(winnerIndex);
    }
  }

  animFrame = requestAnimationFrame(animate);
}

async function finishDraw(winnerIndex) {
  isSpinning = false;
  document.getElementById('btn-spin').disabled = false;

  const winner = pool[winnerIndex];   // same index the drum landed on
  const round  = document.getElementById('round-select').value;

  // Show winner card
  document.getElementById('winner-display').innerHTML = `
    <div class="winner-card">
      <div class="winner-round">${round}</div>
      <div class="winner-name">🎉 ${winner.name}</div>
      <div class="winner-detail">Table ${winner.table || '—'}</div>
    </div>
  `;

  // Move to won list
  pool = pool.filter(g => g.id !== winner.id);
  wonGuests.push({ ...winner, round });

  renderPool();
  buildDrum();
  addToWinnersLog(winner, round);
  fireConfetti();
  showToast(`✦ ${winner.name} wins ${round}!`);

  // ── Sync winner to Google Sheet ──
  const isConfigured = scriptUrl && scriptUrl !== 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
  if (isConfigured) {
    try {
      await fetch(`${scriptUrl}?action=recordWinner&id=${winner.id}&round=${encodeURIComponent(round)}`);
    } catch(e) { console.warn('Could not sync winner to sheet:', e); }
  }
}

// ── WINNERS LOG ──
function addToWinnersLog(winner, round) {
  const log = document.getElementById('winners-log');
  const list = document.getElementById('winners-list');
  log.style.display = 'block';

  const item = document.createElement('div');
  item.className = 'winner-log-item';
  item.innerHTML = `
    <div class="log-num">${wonGuests.length}</div>
    <div class="log-name">${winner.name}</div>
    <div class="log-table">${round}</div>
  `;
  list.appendChild(item);
}

// ── RESET ──
async function resetDraw() {
  if (!confirm('Reset all draw results? This cannot be undone.')) return;
  wonGuests = [];
  document.getElementById('winners-list').innerHTML = '';
  document.getElementById('winners-log').style.display = 'none';
  document.getElementById('winner-display').innerHTML = `<p style="color:var(--muted);font-size:0.82rem;letter-spacing:0.1em">Press the draw button to reveal a winner</p>`;

  // Clear winner column in Google Sheet
  const isConfigured = scriptUrl && scriptUrl !== 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
  if (isConfigured) {
    try {
      await fetch(`${scriptUrl}?action=clearWinners`);
      showToast('Draw reset — winners cleared from sheet');
    } catch(e) {
      showToast('Draw reset locally — sheet sync failed');
    }
  } else {
    showToast('Draw reset');
  }

  await loadCheckedInGuests();
}

// ── CONFETTI ──
function fireConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#d4829a','#f0b8c8','#88b5a0','#b8c8e8','#d0c0e8','#f5c8a8','#f5e8b0','#e8a0b0'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      top: 0;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${Math.random() * 8 + 4}px;
      height: ${Math.random() * 8 + 4}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
      animation-duration: ${Math.random() * 2 + 2}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

// ── TOAST ──
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:32px;right:32px;background:var(--charcoal);color:var(--ivory);padding:14px 22px;font-size:0.8rem;letter-spacing:0.05em;z-index:200;border-left:3px solid var(--gold);transition:all 0.3s cubic-bezier(.22,1,.36,1);border:1px solid var(--border)';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateY(0)';
  setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// ── INIT ──
loadCheckedInGuests();
</script>
