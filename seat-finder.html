<style>
  :root {
    --ivory: #fdf4f8;
    --cream: #fce8ee;

  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Lato', sans-serif; background: linear-gradient(135deg, var(--bg-start) 0%, #f8f0fa 50%, #f0f4fe 100%); color: var(--charcoal); min-height: 100vh; overflow-x: hidden; }

  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--rose), var(--lavender), var(--periwinkle), var(--peach));
  }
  .header-title h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 500; letter-spacing: 0.03em; color: var(--charcoal); }
  .header-title span { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 2px; }
  .header-nav { display: flex; gap: 8px; }
  .nav-btn {
    padding: 7px 16px; border: 1px solid rgba(212,130,154,0.4); background: rgba(255,255,255,0.6);
    color: var(--charcoal); font-family: 'Lato', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; cursor: pointer; transition: all 0.25s; text-decoration: none;
    display: flex; align-items: center; gap: 6px; border-radius: 2px; backdrop-filter: blur(4px);

  /* ── LAYOUT ── */

  /* ── LEFT PANEL ── */
  .panel {

  /* Search box */

  .map-legend { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-dot.normal   { background: rgba(212,130,154,0.25); border: 1px solid rgba(212,130,154,0.5); }
  .legend-dot.selected { background: var(--gold); }

  .map-container {

  .map-table:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 5; }

  .table-shape {

  .table-label {
    position: absolute;
    bottom: -18px; left: 50%; transform: translateX(-50%);

  /* Seats dots around table */
  .seat-dot {
    position: absolute;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: rgba(212,130,154,0.25);
    border: 1px solid rgba(212,130,154,0.45);

  .seat-dot.target {

  @keyframes seatPulse {

  .spotlight {

  .map-arrow {

  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {

</style>

<script>
// ── STATE ──
const scriptUrl = WEDDING_CONFIG.SCRIPT_URL || '';
let allGuests = [];
let selectedGuest = null;

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  renderMap();
  await loadGuests();
  document.getElementById('search-input').focus();
});

// ── LOAD GUESTS ──
async function loadGuests() {
  const isConfigured = scriptUrl && !scriptUrl.includes('YOUR_SCRIPT_ID');
  if (isConfigured) {
    try {
      const res  = await fetch(`${scriptUrl}?action=getGuests`);
      const data = await res.json();
      allGuests  = data.guests || [];
      return;
    } catch(e) {}
  }
  // Fallback: localStorage
  const saved = localStorage.getItem('wedding-guests');
  if (saved) { allGuests = JSON.parse(saved); return; }
  // Demo
  allGuests = demoGuests();
}

function demoGuests() {
  return [
    { id:1, name:'Somchai Jaidee',          table:'1',   seatNumber:'1-1', checkedIn:true  },
    { id:2, name:'Nattaya Srisuk',           table:'1',   seatNumber:'1-2', checkedIn:true  },
    { id:3, name:'Pravit Thongchai',         table:'2',   seatNumber:'2-1', checkedIn:false },
    { id:4, name:'Malee Thongchai',          table:'2',   seatNumber:'2-2', checkedIn:false },
    { id:5, name:'Wanchai Ruangrat',         table:'3',   seatNumber:'3-1', checkedIn:false },
    { id:6, name:'Apinya Wongsawat',         table:'4',   seatNumber:'4-3', checkedIn:false },
    { id:7, name:'Krit Petcharat',           table:'5',   seatNumber:'5-1', checkedIn:false },
    { id:8, name:'Lalita Somboon',           table:'6',   seatNumber:'6-2', checkedIn:false },
    { id:9, name:'Aey (Bride)',              table:'VIP', seatNumber:'VIP-1',checkedIn:false},
    { id:10,name:'Gard (Groom)',             table:'VIP', seatNumber:'VIP-2',checkedIn:false},
  ];
}

// ── SEARCH ──
function onSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const results = document.getElementById('results');

  if (!q) {
    results.innerHTML = `<div class="hint-state"><span class="hint-icon">✦</span><p>Type your name above to find your seat on the map</p></div>`;
    clearHighlight();
    return;
  }

  const matches = allGuests.filter(g => g.name.toLowerCase().includes(q));

  if (!matches.length) {
    results.innerHTML = `<div class="hint-state"><span class="hint-icon">🔍</span><p>No guest found for "<strong style="color:var(--charcoal)">${escHtml(q)}</strong>".<br>Try a different spelling or ask staff.</p></div>`;
    clearHighlight();
    return;
  }

  results.innerHTML = matches.map((g, i) => `
    <div class="result-card ${selectedGuest && selectedGuest.id === g.id ? 'selected' : ''}"
         onclick="selectGuest(${g.id})"
         style="animation-delay:${i*0.04}s">
      <div class="avatar">${initials(g.name)}</div>
      <div class="result-info">
        <div class="result-name">${escHtml(g.name)}</div>
        <div class="result-meta">
          ${g.table ? `Table ${g.table}` : 'No table assigned'}
        </div>
      </div>
      ${g.seatNumber
        ? `<div class="result-seat-badge">Seat ${g.seatNumber}</div>`
        : `<div class="result-seat-badge no-seat">No seat yet</div>`}
    </div>
  `).join('');

  // Auto-select if single result
  if (matches.length === 1) selectGuest(matches[0].id);
}

// ── SELECT GUEST ──
function selectGuest(id) {
  selectedGuest = allGuests.find(g => g.id == id);
  if (!selectedGuest) return;

  // Refresh result cards selection state
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
  const cards = document.querySelectorAll('.result-card');
  // re-run to update selected class
  onSearchRefreshSelected();

  // Show detail panel
  showSeatDetail(selectedGuest);

  // Highlight on map
  highlightSeat(selectedGuest);
}

function onSearchRefreshSelected() {
  document.querySelectorAll('.result-card').forEach(card => {
    const onclick = card.getAttribute('onclick') || '';
    const m = onclick.match(/selectGuest\((\d+)\)/);
    if (m && selectedGuest && parseInt(m[1]) === selectedGuest.id) {
      card.classList.add('selected');
    }
  });
}

// ── SEAT DETAIL ──
function showSeatDetail(g) {
  const wrap = document.getElementById('seat-detail-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = `
    <div class="seat-detail">
      <div class="detail-label">Your seat</div>
      <div class="detail-name">${escHtml(g.name)}</div>
      <div class="detail-chips">
        ${g.table
          ? `<span class="chip chip-table">🍽 Table ${g.table}</span>`
          : `<span class="chip chip-none">No table assigned</span>`}
        ${g.seatNumber
          ? `<span class="chip chip-seat">✦ Seat ${g.seatNumber}</span>`
          : `<span class="chip chip-none">Seat TBD</span>`}
      </div>
      <div class="detail-hint">
        ${g.seatNumber
          ? `Your seat is highlighted on the map. Look for the glowing dot! ✨`
          : `Your seat number hasn't been assigned yet. Please check with the staff at the reception desk.`}
      </div>
    </div>`;
}

// ── MAP: RENDER TABLES ──
function renderMap() {
  const container = document.getElementById('map-container');
  const tables = WEDDING_CONFIG.TABLES || [];

  tables.forEach(t => {
    const el = document.createElement('div');
    el.className = 'map-table';
    el.id = `table-${t.id}`;
    el.style.left = t.x + '%';
    el.style.top  = t.y + '%';
    el.onclick = () => filterByTable(t.id);

    const seatDots = buildSeatDots(t);
    const shapeClass = t.shape === 'rect' ? 'rect' : 'round';

    el.innerHTML = `
      ${seatDots}
      <div class="table-shape ${shapeClass}">
        <div class="table-shape-inner ${shapeClass}">${t.label}</div>
      </div>
      <div class="table-label">${t.label}</div>
    `;
    container.appendChild(el);
  });
}

function buildSeatDots(table) {
  const seats = table.seats || [];
  const count = seats.length;
  let html = '';

  if (table.shape === 'round') {
    const r = 46; // radius from centre in px
    seats.forEach((seat, i) => {
      const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
      const cx = Math.round(r * Math.cos(angle));
      const cy = Math.round(r * Math.sin(angle));
      html += `<div class="seat-dot" id="seat-${escId(seat)}" data-seat="${seat}" style="left:calc(50% + ${cx}px - 5px);top:calc(50% + ${cy}px - 5px)"></div>`;
    });
  } else {
    // Rect table: seats above and below
    const half   = Math.ceil(count / 2);
    const spacing = 26;
    const totalW  = (half - 1) * spacing;
    seats.forEach((seat, i) => {
      const row = i < half ? 0 : 1;
      const col = i < half ? i : i - half;
      const x   = -totalW / 2 + col * spacing;
      const y   = row === 0 ? -28 : 28;
      html += `<div class="seat-dot" id="seat-${escId(seat)}" data-seat="${seat}" style="left:calc(50% + ${x}px - 5px);top:calc(50% + ${y}px - 5px)"></div>`;
    });
  }
  return html;
}

// ── HIGHLIGHT SEAT ON MAP ──
function highlightSeat(guest) {
  // Clear all highlights
  clearHighlight();

  if (!guest.seatNumber || !guest.table) return;

  const tableConf = (WEDDING_CONFIG.TABLES || []).find(t => String(t.id) === String(guest.table));
  if (!tableConf) return;

  // Highlight table wrapper
  const tableEl = document.getElementById(`table-${tableConf.id}`);
  if (tableEl) tableEl.classList.add('highlighted');

  // Highlight specific seat dot
  const seatEl = document.getElementById(`seat-${escId(guest.seatNumber)}`);
  if (seatEl) seatEl.classList.add('target');

  // Move spotlight to table position
  const spotlight = document.getElementById('spotlight');
  spotlight.style.left = tableConf.x + '%';
  spotlight.style.top  = tableConf.y + '%';
  spotlight.style.width  = tableConf.shape === 'rect' ? '200px' : '150px';
  spotlight.style.height = tableConf.shape === 'rect' ? '140px' : '150px';
  spotlight.classList.add('show');

  // Scroll map into view on mobile
  const container = document.getElementById('map-container');
  container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearHighlight() {
  document.querySelectorAll('.map-table.highlighted').forEach(el => el.classList.remove('highlighted'));
  document.querySelectorAll('.seat-dot.target').forEach(el => el.classList.remove('target'));
  document.getElementById('spotlight').classList.remove('show');
}

// ── FILTER BY TABLE (clicking table on map) ──
function filterByTable(tableId) {
  const input = document.getElementById('search-input');
  // Show everyone at that table
  const atTable = allGuests.filter(g => String(g.table) === String(tableId));
  const results = document.getElementById('results');
  if (!atTable.length) return;

  results.innerHTML = atTable.map((g, i) => `
    <div class="result-card" onclick="selectGuest(${g.id})" style="animation-delay:${i*0.04}s">
      <div class="avatar">${initials(g.name)}</div>
      <div class="result-info">
        <div class="result-name">${escHtml(g.name)}</div>
        <div class="result-meta">Table ${g.table}</div>
      </div>
      ${g.seatNumber
        ? `<div class="result-seat-badge">Seat ${g.seatNumber}</div>`
        : `<div class="result-seat-badge no-seat">No seat yet</div>`}
    </div>
  `).join('');

  input.value = '';
  input.placeholder = `Guests at Table ${tableId}`;
  setTimeout(() => { input.placeholder = 'e.g. Somchai…'; }, 4000);
}

// ── HELPERS ──
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escId(s) {
  return String(s).replace(/[^a-zA-Z0-9-_]/g, '_');
}
