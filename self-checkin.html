<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<!-- SUCCESS OVERLAY -->

  <div class="success-box">
    <span class="success-icon">🎊</span>
    <div class="success-title">Welcome!</div>
    <div class="success-name" id="success-name"></div>
    <div class="success-detail" id="success-detail"></div>
    <button class="btn-done" onclick="closeSuccess()">Done</button>
  </div>
</div>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="header-eyebrow">You're invited ✦</div>
    <h1 class="header-title" id="page-heading">Welcome to<br>our <em>Wedding</em></h1>
    <p class="header-sub">Search your name below to check in</p>
    <div class="header-divider"></div>
  </div>


  <!-- SEARCH -->
  <div class="search-card">
    <span class="search-label">Find your name</span>
    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          class="search-input"
          type="text"
          id="search-input"
          placeholder="e.g. Somchai…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          oninput="onSearch()"
          onkeydown="if(event.key==='Enter') onSearch()"
        >
      </div>
      <button class="btn-search" onclick="onSearch()">Search</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-wrap" id="results-wrap">
    <div class="state-hint">
      <span class="icon">✦</span>
      <p>Type your name to find yourself on the guest list</p>
    </div>
  </div>

  <div class="footer">✦ &nbsp; Wishing you a wonderful evening &nbsp; ✦</div>
</div>


<script>
  
// ── STATE ──
(function() {
  const names = WEDDING_CONFIG.COUPLE_NAMES || 'Our Wedding';
  document.getElementById('page-title').textContent = `Welcome — ${names}`;
  document.getElementById('page-heading').innerHTML =
    `Welcome to<br><em>${names}</em>`;
})();

let allGuests = [];
let scriptUrl = WEDDING_CONFIG.SCRIPT_URL || '';

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  if (scriptUrl && scriptUrl !== 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec') fetchGuests();
  // Focus search on load (desktop)
  setTimeout(() => document.getElementById('search-input').focus(), 600);
});

// ── FETCH GUESTS ──
async function fetchGuests() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(`${scriptUrl}?action=getGuests`);
    const data = await res.json();
    allGuests = data.guests || [];
  } catch(e) {
    console.warn('Could not load guest list:', e);
  }
}

// ── SEARCH ──
function onSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const wrap = document.getElementById('results-wrap');

  if (!q || q.length < 1) {
    wrap.innerHTML = `<div class="state-hint"><span class="icon">✦</span><p>Type your name to find yourself on the guest list</p></div>`;
    return;
  }

  // If no script URL, use demo guests for preview
  const pool = allGuests.length ? allGuests : demoGuests();
  const matches = pool.filter(g => g.name.toLowerCase().includes(q));

  if (!matches.length) {
    wrap.innerHTML = `
      <div class="state-hint">
        <span class="icon">🔍</span>
        <p>No guest found for "<strong style="color:var(--ivory)">${escHtml(q)}</strong>".<br>
        Try a different spelling or ask staff for help.</p>
      </div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="results-label">${matches.length} guest${matches.length > 1 ? 's' : ''} found</div>
    ${matches.map(g => renderGuestCard(g)).join('')}
  `;
}

function renderGuestCard(g) {
  const initials = g.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const alreadyIn = g.checkedIn;
  return `
    <div class="guest-card ${alreadyIn ? 'already-in' : ''}" id="card-${g.id}">
      <div class="guest-avatar">${initials}</div>
      <div class="guest-info">
        <div class="guest-name">${escHtml(g.name)}</div>
        <div class="guest-meta">
          ${g.table ? `<span>Table ${g.table}</span>` : ''}
          ${g.seats ? `<span>${g.seats} seat${g.seats > 1 ? 's' : ''}</span>` : ''}
          ${alreadyIn && g.checkinTime ? `<span style="color:var(--sage)">✓ ${g.checkinTime}</span>` : ''}
        </div>
      </div>
      <button
        class="btn-checkin ${alreadyIn ? 'done' : ''}"
        onclick="${alreadyIn ? '' : `doCheckIn(${g.id})`}"
        ${alreadyIn ? 'disabled' : ''}>
        ${alreadyIn ? '✓ Done' : 'Check In'}
      </button>
    </div>
  `;
}

// ── CHECK IN ──
async function doCheckIn(id) {
  const guest = (allGuests.length ? allGuests : demoGuests()).find(g => g.id == id);
  if (!guest) return;

  // Optimistic UI update
  guest.checkedIn = true;
  guest.checkinTime = currentTime();
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('already-in');
    card.querySelector('.btn-checkin').textContent = '✓ Done';
    card.querySelector('.btn-checkin').classList.add('done');
    card.querySelector('.btn-checkin').disabled = true;
  }

  // Show success
  showSuccess(guest);

  // Call backend
  if (scriptUrl) {
    try {
      await fetch(`${scriptUrl}?action=selfCheckIn&id=${id}`);
    } catch(e) { console.warn('Check-in sync failed:', e); }
  }
}

// ── SUCCESS ──
function showSuccess(guest) {
  document.getElementById('success-name').textContent = guest.name;
  document.getElementById('success-detail').innerHTML = `
    ${guest.table ? `<span>Table ${guest.table}</span>` : ''}
    ${guest.seats ? `<span>${guest.seats} seat${guest.seats > 1 ? 's' : ''}</span>` : ''}
    <span>${currentTime()}</span>
  `;
  document.getElementById('success-overlay').classList.add('show');
  fireConfetti();
}

function closeSuccess() {
  document.getElementById('success-overlay').classList.remove('show');
  document.getElementById('search-input').value = '';
  document.getElementById('results-wrap').innerHTML = `<div class="state-hint"><span class="icon">✦</span><p>Type your name to find yourself on the guest list</p></div>`;
  document.getElementById('search-input').focus();
}

// ── CONFETTI ──
function fireConfetti() {
  const colors = ['#d4829a','#f0b8c8','#88b5a0','#b8c8e8','#d0c0e8','#f5c8a8','#f5e8b0'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = Math.random() * 7 + 4;
    el.style.cssText = `
      left: ${Math.random() * 100}%;
      top: -10px;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${Math.random() * 2.5 + 1.5}s;
      animation-delay: ${Math.random() * 0.6}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}



// ── HELPERS ──
function currentTime() {
  const now = new Date();
  return String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function demoGuests() {
  return [
